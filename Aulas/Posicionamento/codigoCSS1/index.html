<!doctype html>
<html>
    <head>
        <title>Figuras</title>
        <style type="text/css">
            * {
                box-sizing: border-box;
            }

            .um {
                background-color: aqua;
            }
            .dois {
                background-color: aqua;
                border: 2px solid blue;
            }
            .tres {
                background-color: aqua;
                border: 2px solid blue;
                padding: 4px;
            }
            .quatro {
                background-color: aqua;
                border: 2px solid blue;
                padding: 4px;
                margin: 4px;
            }
            .cinco {
                background-color: aqua;
                border: 2px dotted blue;
                padding-left: 20px;
            }
            .seis {
                background-color: aqua;
                border: 2px solid blue;
                width: 100px;
                height: 80px;
            }
            .sete {
                background-color: aqua;
                border: 2px solid blue;
                width: 100px;
                height: 80px;
                padding: 6px;
                margin: 6px;
            }
        </style>
    </head>
    <body>
        <div class="um">Um</div>
        <div class="dois">Dois</div>
        <div class="tres">Tres</div>
        <div class="quatro">Quatro</div>
        <div class="cinco">Cinco</div>
        <div class="seis">Seis</div>
        <div class="sete">Sete</div>
    </body>
</html>
