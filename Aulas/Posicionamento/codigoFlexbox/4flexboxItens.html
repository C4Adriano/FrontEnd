<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <style>
            .container {
                display: flex;

                flex-flow: row nowrap;

                align-items: center;
                gap: 0.5vw;

                border: 0.5vw blue solid;
                margin: auto;
                width: 90vw;
                height: 30vw;
            }

            .item {
                border: 0.2vw red solid;
                width: 100px;
                height: 40px;
                flex-grow: 0;
                flex-shrink: 1;
            }

            .dif {
                order: -1;
                align-self: flex-start;
                flex-grow: 2;
                /* flex-shrink: 2; */

                border: 0.2vw red solid;
                width: 100px;
                height: 40px;
                /*flex: 2 2 auto;*/
            }
        </style>
        <div class="container">
            <div class="item"></div>
            <div class="dif"></div>
            <div class="item"></div>
        </div>
    </body>
</html>
