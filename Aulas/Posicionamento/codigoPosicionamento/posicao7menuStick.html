<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css" />
        <title>Página com Menu Sticky</title>
        <style>
            /* Estilo do corpo da página */
            body {
                font-family: Arial, sans-serif;
            }

            /* Header sticky */
            header {
                position: sticky;
                top: 0;
                height: 60px; /* Altura definida explicitamente */
                padding: 20px 0;
                background-color: #333;
                text-align: center;

            }

            header nav a {
                color: white;
                text-decoration: none;
                margin: 0 15px;
            }

            header nav a:hover {
                color: #ffd700;
            }

            /* Seções - são as âncoras */
            section {
                padding: 10px ;
                min-height: 100vh ;
                text-align: center;
                scroll-margin-top: 60px; /* Corresponde à altura do menu */
            }

            #home {
                background-color: #e0e0e0;
            }

            #sobre {
                background-color: #f0f0f0;
            }

            #servicos {
                background-color: #e0e0e0;
            }

            #contato {
                background-color: #f0f0f0;
            }
        </style>
    </head>
    <body>
        <!-- Header Sticky -->
        <header>
            <nav>
                <a href="#inicio">Início</a>
                <a href="#sobre">Sobre</a>
                <a href="#servicos">Serviços</a>
                <a href="#contato">Contato</a>
            </nav>
        </header>

        <!-- Seções -->
        <section id="inicio">
            <div>
                <h1>Bem-vindo à Página Exemplo</h1>
                <p>Navegue pelas seções usando o menu sticky.</p>
            </div>
        </section>

        <section id="sobre">
            <div>
                <h2>Sobre Nós</h2>
                <p>Conheça um pouco mais sobre nossa empresa ou projeto.</p>
            </div>
        </section>

        <section id="servicos">
            <div>
                <h2>Nossos Serviços</h2>
                <p>Descubra os serviços que oferecemos.</p>
            </div>
        </section>

        <section id="contato">
            <div>
                <h2>Entre em Contato</h2>
                <p>Entre em contato conosco para mais informações.</p>
            </div>
        </section>
    </body>
</html>
